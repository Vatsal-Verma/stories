name: Story Submission → Create PR

on:
  issues:
    types:
      - labeled

jobs:
  create-story-pr:
    if: >
      github.repository == 'jenkins-infra/stories' &&
      github.event.label.name == 'story-submission'

    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Parse Issue Form
        id: issue-parser
        uses: stefanbuck/github-issue-parser@cb6e97157cbf851e3a393ff8d57c93a484cc323f

      - name: Save parsed form
        env:
          PARSED_JSON: ${{ steps.issue-parser.outputs.jsonString }}
        run: |
          mkdir -p .story-submission
          printf '%s' "$PARSED_JSON" > .story-submission/parsed.json

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create or Checkout Branch
        id: branch
        run: |
          BRANCH=$(node .github/scripts/get-branch-name.js)

          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

          git fetch origin

          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null; then
            echo "Checking out existing branch..."
            git switch -C "$BRANCH" --track "origin/$BRANCH"
          else
            echo "Creating new branch..."
            git switch -c "$BRANCH"
          fi

      - name: Generate Story
        run: |
          node .github/scripts/generate-story.js

      - name: Validate Story
        run: npm run validate:stories

      - name: Commit Story
        id: commit
        run: |
          ISSUE_NUMBER=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")

          git add src/user-story/

          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git commit -m "Add story from issue #${ISSUE_NUMBER}"

          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Push Branch
        if: steps.commit.outputs.changed == 'true'
        env:
          BRANCH: ${{ steps.branch.outputs.branch }}
        run: |
          git push --set-upstream origin "$BRANCH"

      - name: Create Pull Request
        id: pr
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ steps.branch.outputs.branch }}
        run: |
          ISSUE_TITLE=$(jq -r '.issue.title' "$GITHUB_EVENT_PATH")
          ISSUE_NUMBER=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")

          if gh pr view "$BRANCH" >/dev/null 2>&1; then
            PR_URL=$(gh pr view "$BRANCH" --json url -q .url)
          else
            gh pr create \
              --title "$ISSUE_TITLE" \
              --body "Automatically generated from issue #${ISSUE_NUMBER}" \
              --head "$BRANCH" \
              --base main

            PR_URL=$(gh pr view "$BRANCH" --json url -q .url)
          fi

          echo "url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Comment on Issue
        if: steps.commit.outputs.changed == 'true' && success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ steps.pr.outputs.url }}
        run: |
          ISSUE_NUMBER=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")

          gh issue comment "$ISSUE_NUMBER" \
            --body "✅ Thank you for your submission!

          Your story has been converted into a Pull Request.

          $PR_URL"

      - name: Comment on Failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUMBER=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")

          gh issue comment "$ISSUE_NUMBER" \
            --body "❌ Sorry! Your story submission could not be processed automatically.

          Please review the workflow logs or contact a maintainer."
